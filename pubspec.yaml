name: snaptune
description: Perfect before you share.
publish_to: none
version: 1.2.1+4

environment:
  sdk: ^3.10.8
  flutter: ">=3.38.9"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.3

  # Navigation
  go_router: ^14.8.1

  # Gallery / media access
  photo_manager: ^3.6.3

  # Native image compression (handles HEIC/HEIF on iOS, faster than Dart image package)
  flutter_image_compress: ^2.4.0

  # File system
  path_provider: ^2.1.5
  path: ^1.9.1

  # Permissions
  permission_handler: ^11.4.0

  # Sharing
  share_plus: ^10.1.4

  # Video playback
  video_player: ^2.9.2

  # Functional programming (Either / Option)
  dartz: ^0.10.1

  # Fonts
  google_fonts: ^6.2.1

  # Preferences
  shared_preferences: ^2.3.5

  # ML: on-device face detection (no API key, works offline)
  google_mlkit_face_detection: ^0.11.0

  # Video transcoding — H.264, VFR→CFR, status splitter (min-gpl = ~20MB, includes libx264)
  ffmpeg_kit_flutter_min_gpl: ^6.0.3

  # Utilities
  intl: ^0.20.2
  mime: ^2.0.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
